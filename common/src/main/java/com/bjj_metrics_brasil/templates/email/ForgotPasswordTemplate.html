<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recuperação de Senha</title>
</head>

<body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Arial, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="padding:20px 0; background-color:#f4f4f4;">
    <tr>
        <td align="center">

            <!-- Container -->
            <table width="500" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:8px; padding:30px;">

                <!-- Título -->
                <tr>
                    <td style="text-align:center; font-size:20px; font-weight:bold; color:#333;">
                        Recuperação de senha
                    </td>
                </tr>

                <!-- Espaço -->
                <tr><td height="20"></td></tr>

                <!-- Texto -->
                <tr>
                    <td style="font-size:15px; color:#555; text-align:center;">
                        Use o código abaixo para redefinir sua senha:
                    </td>
                </tr>

                <!-- Código -->
                <tr>
                    <td align="center" style="padding:30px 0;">
                        <div style="
                            font-size:32px;
                            letter-spacing:8px;
                            font-weight:bold;
                            color:#2563eb;
                        " th:text="${code}">
                            123456
                        </div>
                    </td>
                </tr>

                <!-- Expiração -->
                <tr>
                    <td style="font-size:14px; color:#777; text-align:center;">
                        Este código expira em
                        <strong th:text="${expirationTime}">5 minutos</strong>.
                    </td>
                </tr>

                <!-- Aviso -->
                <tr>
                    <td style="font-size:13px; color:#999; text-align:center; padding-top:20px;">
                        Se você não solicitou a redefinição de senha, ignore este email.
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
