spring:
  config:
    import:
      - classpath:authentication.yml
      - classpath:app.yml
      - classpath:notification.yml
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

server:
  address: 0.0.0.0
  port: 8080